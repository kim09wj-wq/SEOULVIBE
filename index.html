<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-P6JSM8FL');</script>
  <!-- End Google Tag Manager -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seoul Summer Vibe - Travel Guide</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-down': 'slideDown 0.3s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideDown: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P6JSM8FL"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Icon Components ---
    const IconBase = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-6 h-6"}>
        {children}
      </svg>
    );
    const ChevronDown = ({className}) => <IconBase className={className}><path d="m6 9 6 6 6-6"/></IconBase>;
    const ArrowRight = ({className}) => <IconBase className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconBase>;
    const ArrowLeft = ({className}) => <IconBase className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></IconBase>;
    const MapIcon = ({className}) => <IconBase className={className}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></IconBase>;
    const Smartphone = ({className}) => <IconBase className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></IconBase>;
    const Star = ({className}) => <IconBase className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
    const Share2 = ({className}) => <IconBase className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></IconBase>;
    const Instagram = ({className}) => <IconBase className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></IconBase>;
    const MessageCircle = ({className}) => <IconBase className={className}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></IconBase>;
    const Send = ({className}) => <IconBase className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></IconBase>;
    const CheckCircle = ({className}) => <IconBase className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></IconBase>;
    const AlertCircle = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
    const Check = ({className}) => <IconBase className={className}><polyline points="20 6 9 17 4 12"/></IconBase>;
    
    // ✨ 틱톡 아이콘 추가
    const TikTok = ({className}) => (
      <svg className={className} viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 15.68a6.34 6.34 0 0 0 6.27 6.32 6.32 6.32 0 0 0 6.27-6.31V9.52a8.3 8.3 0 0 0 4.46 1.25V7.33a5.06 5.06 0 0 1-2.41-.64z"/>
      </svg>
    );

    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxSsA86QtAljywV2FwtSTnove0HMuNT32sj7eF58rih3hECpTEPE0aadY5NOplOG9rJ/exec";

    function App() {
      const [isScrolled, setIsScrolled] = useState(false);
      
      // ✨ 다단계 설문 및 불필요한 상태 제거 (이메일, 나이 직접 입력, 방문의향만 남김)
      const [formData, setFormData] = useState({
        visitIntent: '', 
        age: '',      
        email: ''
      });
      
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [formError, setFormError] = useState(''); 
      const [copySuccess, setCopySuccess] = useState(false);

      const bgImages = {
        q1: "https://images.unsplash.com/photo-1617058866759-b1d5bdbe4203?auto=format&fit=crop&q=80",
        q2: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80",
        q3: "https://images.unsplash.com/photo-1548115184-bc6544d06a58?auto=format&fit=crop&q=80",
        q4: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80",
        q5: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80" 
      };

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollTo = (id) => {
        const element = document.getElementById(id);
        if (element) {
          window.scrollTo({
            top: element.offsetTop - 80,
            behavior: 'smooth'
          });
        }
      };

      // ✨ 핸들서브밋(제출) 로직도 새 양식에 맞춰 간소화
      const handleSubmit = async (e) => {
        e.preventDefault();
        
        // 방문 의향 선택 여부 검증
        if (!formData.visitIntent) {
          setFormError('Lütfen ziyaret planınızı seçin. (방문 의향을 선택해주세요)');
          return;
        }

        // 이메일 양식 검증
        if (!formData.email.includes('@')) {
          setFormError('Lütfen geçerli bir e-posta adresi girin. (@ işareti gereklidir)');
          return;
        }
        
        setFormError('');
        setIsSubmitting(true);

        // 구글 시트로 보낼 간소화된 Payload
        const payload = {
          email: formData.email,
          age: formData.age, 
          visit_intent: formData.visitIntent === 'Evet' ? '방문 의향 있음' : '방문 의향 없음',
          submittedAt: new Date().toISOString()
        };

        try {
          if (WEBHOOK_URL) {
            await fetch(WEBHOOK_URL, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 
                'Content-Type': 'text/plain;charset=utf-8' 
              },
              body: JSON.stringify(payload)
            });
          }

          // --- [마케팅 태깅 및 중복 전환 방지 로직] ---
          const alreadySubmitted = sessionStorage.getItem('form_submitted');

          if (!alreadySubmitted) {
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
              'event': 'SubmitForm',
              'formName': 'Seoul_Summer_Guide',
              'userEmail': formData.email,
              'userAge': formData.age, 
              'visitIntent': payload.visit_intent
            });

            sessionStorage.setItem('form_submitted', 'true');
            console.log('✅ 초기 전환 이벤트 발송 완료 (SubmitForm)');
          } else {
            console.log('🚫 이미 전환이 측정된 세션입니다. 중복 발송 차단됨.');
          }
          
          setTimeout(() => {
            setIsSubmitting(false);
            setIsSubmitted(true);
          }, 1000);

        } catch (error) {
          console.error("전송 에러:", error);
          setIsSubmitting(false);
          setIsSubmitted(true); 
        }
      };

      const copyToClipboard = () => {
        // ✨ UTM이 포함된 고정 링크로 변경
        const url = "https://seoulvibe-eight.vercel.app/?utm_source=tiktok&utm_medium=paid&utm_campaign=__URL-SHARE__&utm_id=__CAMPAIGN_ID__";
        const textArea = document.createElement("textarea");
        textArea.value = url;
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();

        try {
          document.execCommand('copy');
          setCopySuccess(true);
          setTimeout(() => setCopySuccess(false), 3000);
        } catch (err) {}

        document.body.removeChild(textArea);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
          
          {/* Header */}
          <header className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white shadow-md py-4' : 'bg-transparent py-6'}`}>
            <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
              <div className="font-black text-2xl tracking-tighter cursor-pointer" onClick={() => scrollTo('home')}>
                <span className={isScrolled ? 'text-indigo-600' : 'text-white'}>SEOUL</span>
                <span className={isScrolled ? 'text-slate-900' : 'text-white/80'}>VIBE</span>
              </div>
              <nav className="hidden md:flex space-x-8 text-sm font-bold">
                <button onClick={() => scrollTo('why-seoul')} className={`${isScrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-white/90 hover:text-white'} transition-colors`}>Why Seoul?</button>
                <button onClick={() => scrollTo('home')} className={`${isScrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-white/90 hover:text-white'} transition-colors`}>Get Guidebook</button>
                <button onClick={() => scrollTo('share')} className={`${isScrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-white/90 hover:text-white'} transition-colors`}>Share</button>
              </nav>
              <button onClick={() => scrollTo('home')} className="md:hidden bg-indigo-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg">Rehberi Al</button>
            </div>
          </header>

          {/* Section 1: New Hero (Interactive Lead Form) */}
          <section id="home" className="relative min-h-screen flex items-center justify-center py-20 md:py-24 text-white overflow-hidden">
            {/* ✨ 히어로 뒷 배경 (설문 뒤에 깔리는 전체 배경) ✨ */}
            <div className="absolute inset-0 z-0">
              <img 
                src="https://cdn.midjourney.com/f6b4924d-121e-4dea-a870-8763882d1411/0_0.png" 
                alt="Seoul Background" 
                className="w-full h-full object-cover" 
              />
              {/* 가독성을 높이기 위한 어두운 오버레이 및 블러 처리 */}
              <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px]"></div>
            </div>

            <div className="max-w-3xl mx-auto px-6 relative z-10 w-full pt-16 md:pt-10">
              
              <div className="text-center mb-10">
                <h2 className="text-3xl md:text-5xl font-black mb-3 drop-shadow-lg">Kişiye özel rehberinizi alın</h2>
                <p className="text-sm md:text-lg text-slate-200 drop-shadow-md">당신만을 위한 가이드를 받아가세요.</p>
              </div>

              {!isSubmitted ? (
                <div className="bg-slate-800/95 backdrop-blur-md rounded-3xl overflow-hidden shadow-2xl border border-slate-700 relative mt-8">
                  {/* 설문 박스 안쪽의 옅은 배경 유지 */}
                  <div className="absolute inset-0 opacity-20 transition-opacity duration-500 pointer-events-none">
                    <img src={bgImages.q5} alt="Form Background" className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/80 to-transparent"></div>
                  </div>

                  <div className="relative z-10 p-8 md:p-12">
                    {/* ✨ 다단계(Step) 폼 전체를 날리고 원스텝 폼으로 교체 */}
                    <div className="animate-fade-in">
                      <div className="text-center mb-8">
                        <h3 className="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-indigo-400 mb-2">Harika! Son bir adım.</h3>
                        <p className="text-sm md:text-base text-slate-300">Rehberi almak için bilgilerinizi girin.</p>
                        <p className="text-slate-400 text-xs mt-1">가이드북을 받을 정보를 입력해 주세요.</p>
                      </div>

                      <form onSubmit={handleSubmit} className="space-y-5 md:space-y-6">
                        {/* 1. 방문 의향 버튼 선택 */}
                        <div>
                          <label className="block text-sm font-bold text-slate-300 mb-2">Kore'yi ziyaret etme planınız var mı? (한국 방문 계획)</label>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <button 
                              type="button"
                              onClick={() => {
                                setFormData({...formData, visitIntent: 'Evet'});
                                setFormError('');
                              }}
                              className={`py-3 px-2 rounded-xl border font-bold text-sm transition-all ${formData.visitIntent === 'Evet' ? 'bg-indigo-600 border-indigo-500 text-white shadow-lg' : 'bg-slate-900/50 border-slate-600 text-slate-400 hover:border-slate-400 hover:text-slate-200'}`}
                            >
                              Evet, planlıyorum (의향 있음)
                            </button>
                            <button 
                              type="button"
                              onClick={() => {
                                setFormData({...formData, visitIntent: 'Hayır'});
                                setFormError('');
                              }}
                              className={`py-3 px-2 rounded-xl border font-bold text-sm transition-all ${formData.visitIntent === 'Hayır' ? 'bg-indigo-600 border-indigo-500 text-white shadow-lg' : 'bg-slate-900/50 border-slate-600 text-slate-400 hover:border-slate-400 hover:text-slate-200'}`}
                            >
                              Hayır, sadece rehber (가이드북만)
                            </button>
                          </div>
                          {formError && formError.includes('ziyaret') && (
                            <div className="flex items-center mt-2 text-red-400 text-sm font-medium">
                              <AlertCircle className="w-4 h-4 mr-1" />
                              {formError}
                            </div>
                          )}
                        </div>

                        {/* 2. 나이 직접 입력 (숫자) */}
                        <div>
                          <label className="block text-sm font-bold text-slate-300 mb-1">Yaşınız (나이)</label>
                          <input 
                            type="number" 
                            required
                            min="1"
                            max="120"
                            className="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                            placeholder="Lütfen yaşınızı girin (예: 25)"
                            value={formData.age}
                            onChange={(e) => setFormData({...formData, age: e.target.value})}
                          />
                        </div>

                        {/* 3. 이메일 입력칸 */}
                        <div>
                          <label className="block text-sm font-bold text-slate-300 mb-1">E-posta (이메일)</label>
                          <input 
                            type="email" 
                            required
                            className={`w-full bg-slate-900/50 border rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-1 ${formError.includes('@') ? 'border-red-500 focus:border-red-500 focus:ring-red-500' : 'border-slate-600 focus:border-indigo-500 focus:ring-indigo-500'}`}
                            placeholder="ornek@email.com"
                            value={formData.email}
                            onChange={(e) => {
                              setFormData({...formData, email: e.target.value});
                              if(e.target.value.includes('@')) setFormError('');
                            }}
                          />
                          {formError && formError.includes('@') && (
                            <div className="flex items-center mt-2 text-red-400 text-sm font-medium">
                              <AlertCircle className="w-4 h-4 mr-1" />
                              {formError}
                            </div>
                          )}
                          {/* Ubutumwa bwerekeye umutekano w'amakuru y'ibanga */}
                          <p className="text-[11px] text-slate-400/80 mt-2 font-light leading-snug">
                            Bilgileriniz sadece rehber gönderimi ve size özel seyahat duyuruları için kullanılır.
                          </p>
                        </div>
                        
                        <button 
                          type="submit"
                          disabled={isSubmitting}
                          className={`w-full mt-6 text-white font-black py-4 rounded-xl flex items-center justify-center transform transition-all shadow-lg ${isSubmitting ? 'bg-slate-600 cursor-wait' : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 hover:-translate-y-1 shadow-indigo-500/30'}`}
                        >
                          {isSubmitting ? 'Gönderiliyor...' : '🎁 Rehberi Hemen İndir '}
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
              ) : (
                // Success Message
                <div className="bg-slate-800/95 backdrop-blur-md rounded-3xl p-8 md:p-12 text-center border border-slate-700 shadow-2xl mt-8 animate-fade-in">
                  <div className="w-16 h-16 md:w-20 md:h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-6">
                    <CheckCircle className="w-8 h-8 md:w-10 md:h-10" />
                  </div>
                  <h3 className="text-2xl md:text-3xl font-black mb-3">Teşekkürler!</h3>
                  <p className="text-base md:text-xl text-slate-300 mb-2">Rehberiniz <strong>{formData.email}</strong> adresine gönderildi.</p>
                  <p className="text-sm md:text-base text-slate-500 mb-8">Lütfen e-posta kutunuzu kontrol edin.</p>
                  
                  <div className="bg-slate-900/50 p-5 md:p-6 rounded-2xl inline-block text-left border border-slate-700">
                    <p className="text-xs md:text-sm text-slate-400 mb-4 text-center">Daha fazla ipucu için bizi takip edin!</p>
                    <div className="flex justify-center space-x-4">
                      <a href="https://instagram.com" target="_blank" rel="noreferrer" className="w-10 h-10 md:w-12 md:h-12 bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 text-white rounded-full flex items-center justify-center hover:opacity-90 transition-opacity">
                        <Instagram className="w-5 h-5 md:w-6 md:h-6" />
                      </a>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </section>

          {/* Section 2: Persuasion (Now moved below the new Hero Section) */}
          <section id="why-seoul" className="py-24 bg-white">
            <div className="max-w-6xl mx-auto px-6">
              <div className="text-center mb-12 md:mb-16">
                <span className="inline-block py-1 px-4 rounded-full bg-indigo-50 text-indigo-600 text-sm font-bold mb-4">
                  🇰🇷 Seul Macerasına Hazır Mısınız?
                </span>
                <h2 className="text-3xl md:text-4xl font-black mb-4">Seoul Seyahatiniz Artık Çok Kolay</h2>
                <p className="text-slate-500 font-medium max-w-2xl mx-auto">Pratik bilgilerle dil bariyerini aşın ve yerel halk gibi gezin.</p>
              </div>

              {/* ✨ 가이드북 멘트 (가로형 배너 형태) ✨ */}
              <div className="max-w-4xl mx-auto bg-gradient-to-br from-slate-50 to-indigo-50 p-6 md:p-10 rounded-[2rem] border border-indigo-100 shadow-lg mb-16 text-center">
                <h3 className="text-2xl font-black text-slate-800 mb-3">Bu rehber size neler sunuyor?</h3>
                <p className="text-slate-600 mb-2 font-medium leading-relaxed">
                  "Ulaşım, yemek ve gizli mekanlar... Bu yaz Seul'de unutulmaz bir hikaye yazmanız için gereken tüm sırlar bu kitapçıkta!"
                </p>
                <p className="text-xs md:text-sm text-slate-400 mb-6 font-medium">
                  (교통, 맛집, 숨겨진 명소까지! 서울에서의 완벽한 휴가를 위한 모든 꿀팁이 담겨 있습니다.)
                </p>

                {/* ✨ 추가된 가이드북 썸네일 이미지 (텍스트와 버튼 사이) ✨ */}
                <div className="relative inline-block group mb-8 mt-2">
                  <div className="absolute -inset-1 bg-gradient-to-r from-pink-500 to-indigo-500 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                  <img 
                    src="https://glamorous-maroon-nxgw7smvee.edgeone.app/%EC%8A%A4%ED%81%AC%EB%A6%B0%EC%83%B7%202026-05-04%20100433.png" 
                    alt="Guidebook Preview" 
                    className="relative rounded-2xl shadow-lg w-full max-w-sm mx-auto object-cover transform group-hover:scale-[1.02] transition-transform duration-300 border border-white/50"
                  />
                </div>
                
                <div className="block">
                  <button onClick={() => scrollTo('home')} className="w-full md:w-auto inline-flex bg-slate-900 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-600 transition-colors items-center justify-center">
                    Rehberi Almaya Başla <ArrowRight className="ml-2 w-4 h-4" />
                  </button>
                </div>
              </div>

              {/* ✨ 삭제되었던 3개의 핵심 설명 카드 완벽 복구 ✨ */}
              <div className="grid md:grid-cols-3 gap-6 md:gap-8">
                <div className="bg-slate-50 rounded-3xl p-6 md:p-8 hover:shadow-xl transition-shadow border border-slate-100">
                  <div className="w-12 h-12 md:w-14 md:h-14 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mb-4 md:mb-6">
                    <Star className="w-6 h-6 md:w-7 md:h-7" />
                  </div>
                  <h3 className="text-xl font-bold mb-2">En İyi Festivaller</h3>
                  <p className="text-sm md:text-base text-slate-600 mb-4">K-POP konserleri ve Han Nehri gösterileri gibi en iyi etkinlikler.</p>
                  <div className="text-xs text-slate-400 font-mono bg-white p-2 rounded inline-block">📍 Jung-gu, Gangnam</div>
                </div>

                <div className="bg-slate-50 rounded-3xl p-6 md:p-8 hover:shadow-xl transition-shadow border border-slate-100">
                  <div className="w-12 h-12 md:w-14 md:h-14 bg-pink-100 text-pink-600 rounded-2xl flex items-center justify-center mb-4 md:mb-6">
                    <Smartphone className="w-6 h-6 md:w-7 md:h-7" />
                  </div>
                  <h3 className="text-xl font-bold mb-2">Gerekli Uygulamalar</h3>
                  <p className="text-sm md:text-base text-slate-600 mb-4">Naver Map, Papago ve Kakao T ile kolay ulaşım ve çeviri rehberi.</p>
                  <div className="text-xs text-slate-400 font-mono bg-white p-2 rounded inline-block">📱 Kullanım kılavuzu</div>
                </div>

                <div className="bg-slate-50 rounded-3xl p-6 md:p-8 hover:shadow-xl transition-shadow border border-slate-100">
                  <div className="w-12 h-12 md:w-14 md:h-14 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mb-4 md:mb-6">
                    <MapIcon className="w-6 h-6 md:w-7 md:h-7" />
                  </div>
                  <h3 className="text-xl font-bold mb-2">Hayatta Kalma Korecesi</h3>
                  <p className="text-sm md:text-base text-slate-600 mb-4">Restoranda ve alışverişte hayat kurtaran pratik Korece ifadeler.</p>
                  <div className="text-xs text-slate-400 font-mono bg-white p-2 rounded inline-block">🗣️ Okunuşları ile</div>
                </div>
              </div>

            </div>
          </section>

          {/* Section 3: Viral Loop / Share */}
          <section id="share" className="py-20 md:py-24 bg-slate-50 border-t border-slate-100 relative">
            <div className="max-w-4xl mx-auto px-6 text-center">
              <div className="w-14 h-14 md:w-16 md:h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                <Share2 className="w-7 h-7 md:w-8 md:h-8" />
              </div>
              <h2 className="text-2xl md:text-4xl font-black mb-4">Arkadaşlarınla Paylaş!</h2>
              <p className="text-base md:text-lg text-slate-500 mb-8 max-w-2xl mx-auto">
                Kore'ye birlikte gitmek istediğin arkadaşınla paylaş ve seyahat planlarına hemen başlayın.
              </p>
              
              <div className="flex flex-col sm:flex-row justify-center items-center gap-3 md:gap-4">
                {/* ✨ 틱톡 버튼 (링크 및 텍스트 변경) */}
                <a 
                  href="https://www.tiktok.com/@seoul_pov"
                  target="_blank" rel="noreferrer"
                  className="w-full sm:w-auto flex items-center justify-center px-8 py-4 bg-black text-white font-bold rounded-xl hover:bg-gray-800 transition-colors shadow-md hover:shadow-lg"
                >
                  <TikTok className="w-6 h-6 mr-2" />
                  Videoyu izle
                </a>

                {/* 링크 복사 기능 */}
                <button 
                  onClick={copyToClipboard}
                  className="w-full sm:w-auto flex items-center justify-center px-8 py-4 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors shadow-md hover:shadow-lg relative"
                >
                  {copySuccess ? (
                    <><Check className="w-6 h-6 mr-2 text-green-400" /> Kopyalandı!</>
                  ) : (
                    <><Send className="w-6 h-6 mr-2" /> Bağlantıyı Kopyala</>
                  )}
                  
                  {/* 링크 복사 성공 시 뜨는 툴팁 */}
                  {copySuccess && (
                    <div className="absolute -top-12 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-xs py-2 px-4 rounded-lg shadow-xl whitespace-nowrap">
                      Bağlantı kopyalandı! (링크가 복사되었습니다)
                      <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 translate-y-1/2 rotate-45 w-2 h-2 bg-slate-800"></div>
                    </div>
                  )}
                </button>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-slate-900 py-8 text-center text-slate-400 text-sm border-t border-slate-800">
            <p>© 2026 Seoul Travel Guide Campaign. All rights reserved.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
