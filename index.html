<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-P6JSM8FL');</script>
  <!-- End Google Tag Manager -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seoul Summer Vibe - Travel Guide</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-down': 'slideDown 0.3s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideDown: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM (React 18 사용, JSX 컴파일 에러 해결) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P6JSM8FL"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Icon Components ---
    const IconBase = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className || "w-6 h-6"}>
        {children}
      </svg>
    );
    const ChevronDown = ({className}) => <IconBase className={className}><path d="m6 9 6 6 6-6"/></IconBase>;
    const ArrowRight = ({className}) => <IconBase className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconBase>;
    const ArrowLeft = ({className}) => <IconBase className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></IconBase>;
    const MapIcon = ({className}) => <IconBase className={className}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></IconBase>;
    const Smartphone = ({className}) => <IconBase className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></IconBase>;
    const Star = ({className}) => <IconBase className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
    const Share2 = ({className}) => <IconBase className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></IconBase>;
    const Instagram = ({className}) => <IconBase className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></IconBase>;
    const MessageCircle = ({className}) => <IconBase className={className}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></IconBase>;
    const Send = ({className}) => <IconBase className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></IconBase>;
    const CheckCircle = ({className}) => <IconBase className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></IconBase>;
    const AlertCircle = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
    const Check = ({className}) => <IconBase className={className}><polyline points="20 6 9 17 4 12"/></IconBase>;

    // 👇👇👇 구글 앱스 스크립트(웹훅) URL 👇👇👇
    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxSsA86QtAljywV2FwtSTnove0HMuNT32sj7eF58rih3hECpTEPE0aadY5NOplOG9rJ/exec";

    function App() {
      const [isScrolled, setIsScrolled] = useState(false);
      const [currentStep, setCurrentStep] = useState(1); // 1~5단계로 변경
      
      // ✨ 나이(age), 성별(gender) 추가 & 이름(name) 제거
      const [formData, setFormData] = useState({
        q1: '', q1_other: '',
        q2: '',
        q3: '', q3_other: '',
        age: '',      // 4단계 나이 추가
        gender: '',   // 5단계 성별 추가
        email: ''     // 이름(name) 제거됨
      });
      
      const [showOtherQ1, setShowOtherQ1] = useState(false);
      const [showOtherQ3, setShowOtherQ3] = useState(false);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [formError, setFormError] = useState(''); // 에러 통합 관리
      const [copySuccess, setCopySuccess] = useState(false);

      const koreanMapping = {
        'Alışveriş': '쇼핑',
        'Yemek': '음식',
        'Doğal manzara': '자연경관',
        'Diğer': '기타',
        '3 ay içinde': '3개월 이내',
        '6 ay içinde': '6개월 이내',
        'Gelecek yıl veya sonrası': '내년 이후 (또는 미정)',
        'Henüz ziyaret planım yok': '방문 계획 없음 (가이드북만 희망)',
        'Maliyet': '비용 (예산 및 비싼 경비)',
        'İletişim': '소통 (언어 장벽)',
        'Ulaşım': '교통 (대중교통 및 길찾기)',
        // ✨ 성별 터키어 -> 한국어 변환 매핑
        'Erkek': '남성',
        'Kadın': '여성',
        'Belirtmek istemiyorum': '답변 거부'
      };

      // 🖼️ 111.txt 원본 이미지로 완벽 복구
      const bgImages = {
        hero: "https://cdn.midjourney.com/f6b4924d-121e-4dea-a870-8763882d1411/0_0.png",
        q1: "https://images.unsplash.com/photo-1617058866759-b1d5bdbe4203?auto=format&fit=crop&q=80",
        q2: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80",
        q3: "https://images.unsplash.com/photo-1548115184-bc6544d06a58?auto=format&fit=crop&q=80",
        q4: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80",
        q5: "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80" // 5단계를 위한 이미지 연장
      };

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollTo = (id) => {
        const element = document.getElementById(id);
        if (element) {
          window.scrollTo({
            top: element.offsetTop - 80,
            behavior: 'smooth'
          });
        }
      };

      const handleOptionSelect = (step, field, value, isOther = false) => {
        setFormData({ ...formData, [field]: value });
        
        if (step === 1) {
          if (isOther) {
            setShowOtherQ1(true);
          } else {
            setShowOtherQ1(false);
            setTimeout(() => setCurrentStep(2), 400);
          }
        } else if (step === 2) {
          setTimeout(() => setCurrentStep(3), 400);
        } else if (step === 3) {
          if (isOther) {
            setShowOtherQ3(true);
          } else {
            setShowOtherQ3(false);
            setTimeout(() => setCurrentStep(4), 400); // 3단계 완료 -> 4단계(나이)로 이동
          }
        }
      };

      // 🚀 데이터 제출 및 틱톡 픽셀(이벤트) 중복 측정 방지 🚀
      const handleSubmit = async (e) => {
        e.preventDefault();
        
        // 성별 선택 여부 검증
        if (!formData.gender) {
          setFormError('Lütfen cinsiyetinizi seçin. (성별을 seçin)');
          return;
        }

        // 이메일 양식 검증
        if (!formData.email.includes('@')) {
          setFormError('Lütfen geçerli bir e-posta adresi girin. (@ işareti gereklidir)');
          return;
        }
        
        setFormError('');
        setIsSubmitting(true);

        // 구글 시트로 보낼 Payload
        const payload = {
          email: formData.email,
          age: formData.age, 
          gender_korean: koreanMapping[formData.gender],
          q1_korean: formData.q1 === 'Diğer' ? `기타: ${formData.q1_other}` : koreanMapping[formData.q1],
          q2_korean: koreanMapping[formData.q2],
          q3_korean: formData.q3 === 'Diğer' ? `기타: ${formData.q3_other}` : koreanMapping[formData.q3],
          submittedAt: new Date().toISOString()
        };

        try {
          if (WEBHOOK_URL) {
            await fetch(WEBHOOK_URL, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 
                'Content-Type': 'text/plain;charset=utf-8' 
              },
              body: JSON.stringify(payload)
            });
          }

          // --- [마케팅 태깅 및 중복 전환 방지 로직] ---
          const alreadySubmitted = sessionStorage.getItem('form_submitted');

          if (!alreadySubmitted) {
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
              'event': 'SubmitForm',
              'formName': 'Seoul_Summer_Guide',
              'userEmail': formData.email,
              'userAge': formData.age, 
              'userGender': koreanMapping[formData.gender]
            });

            sessionStorage.setItem('form_submitted', 'true');
            console.log('✅ 초기 전환 이벤트 발송 완료 (SubmitForm)');
          } else {
            console.log('🚫 이미 전환이 측정된 세션입니다. 중복 발송 차단됨.');
          }
          
          setTimeout(() => {
            setIsSubmitting(false);
            setIsSubmitted(true);
          }, 1000);

        } catch (error) {
          console.error("전송 에러:", error);
          setIsSubmitting(false);
          setIsSubmitted(true); 
        }
      };

      const copyToClipboard = () => {
        const url = window.location.href;
        const textArea = document.createElement("textarea");
        textArea.value = url;
        textArea.style.position = "fixed";
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.width = "2em";
        textArea.style.height = "2em";
        textArea.style.padding = "0";
        textArea.style.border = "none";
        textArea.style.outline = "none";
        textArea.style.boxShadow = "none";
        textArea.style.background = "transparent";
        
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();

        try {
          document.execCommand('copy');
          setCopySuccess(true);
          setTimeout(() => setCopySuccess(false), 3000);
        } catch (err) {
          console.error('복사 실패:', err);
        }

        document.body.removeChild(textArea);
      };

      const whatsappMsg = encodeURIComponent("Seul Yaz Seyahat Rehberi 2026'yı mutlaka incelemelisin! Birlikte gidelim mi? 🇰🇷✈️ " + window.location.href);

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
          
          {/* Header */}
          <header className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white shadow-md py-4' : 'bg-transparent py-6'}`}>
            <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
              <div className="font-black text-2xl tracking-tighter cursor-pointer" onClick={() => scrollTo('home')}>
                <span className={isScrolled ? 'text-indigo-600' : 'text-white'}>SEOUL</span>
                <span className={isScrolled ? 'text-slate-900' : 'text-white/80'}>VIBE</span>
              </div>
              <nav className="hidden md:flex space-x-8 text-sm font-bold">
                <button onClick={() => scrollTo('why-seoul')} className={`${isScrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-white/90 hover:text-white'} transition-colors`}>Why Seoul?</button>
                <button onClick={() => scrollTo('get-guidebook')} className={`${isScrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-white/90 hover:text-white'} transition-colors`}>Get Guidebook</button>
                <button onClick={() => scrollTo('share')} className={`${isScrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-white/90 hover:text-white'} transition-colors`}>Share</button>
              </nav>
              <button onClick={() => scrollTo('get-guidebook')} className="md:hidden bg-indigo-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg">Rehberi Al</button>
            </div>
          </header>

          {/* Section 1: Hero */}
          <section id="home" className="relative h-screen flex items-center justify-center overflow-hidden">
            <div className="absolute inset-0">
              <img src={bgImages.hero} alt="Seoul Night View" className="w-full h-full object-cover" />
              <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-indigo-900/80"></div>
            </div>
            
            <div className="relative z-10 text-center px-6 max-w-4xl mx-auto mt-16">
              <span className="inline-block py-1 px-3 rounded-full bg-white/20 text-white border border-white/30 backdrop-blur-md text-sm font-semibold mb-6">
                🇰🇷 2026 Özel Sürüm
              </span>
              <h1 className="text-5xl md:text-7xl font-black text-white leading-tight mb-6 drop-shadow-lg">
                Seoul'un Yazı<br/>
                <span className="text-transparent bg-clip-text bg-gradient-to-r from-pink-300 to-indigo-300">Seninle Daha Güzel!</span>
              </h1>
              <p className="text-lg md:text-xl text-white/90 mb-10 max-w-2xl mx-auto font-medium drop-shadow-md">
                K-POP'tan festivallere, gizli rotalardan pratik uygulamalara kadar Seoul seyahatiniz için tüm sırlar bu rehberde!
              </p>
              <button 
                onClick={() => scrollTo('get-guidebook')}
                className="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-indigo-600 rounded-full hover:bg-indigo-500 hover:shadow-lg hover:shadow-indigo-500/30"
              >
                Ücretsiz Rehberi Al
                <ArrowRight className="ml-2 w-5 h-5 group-hover:translate-x-1 transition-transform" />
              </button>
            </div>
            
            <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 animate-bounce text-white/70 cursor-pointer" onClick={() => scrollTo('why-seoul')}>
              <ChevronDown className="w-8 h-8" />
            </div>
          </section>

          {/* Section 2: Persuasion */}
          <section id="why-seoul" className="py-24 bg-white">
            <div className="max-w-6xl mx-auto px-6">
              <div className="text-center mb-12 md:mb-16">
                <span className="inline-block py-1 px-4 rounded-full bg-indigo-50 text-indigo-600 text-sm font-bold mb-4">
                  🇰🇷 Seul Macerasına Hazır Mısınız?
                </span>
                <h2 className="text-3xl md:text-4xl font-black mb-4">Seoul Seyahatiniz Artık Çok Kolay</h2>
                <p className="text-slate-500 font-medium max-w-2xl mx-auto">Pratik bilgilerle dil bariyerini aşın ve yerel halk gibi gezin.</p>
              </div>

              {/* ✨ 가이드북 썸네일 이미지 복구 및 하단 3개 설명 카드 삭제 ✨ */}
              <div className="max-w-5xl mx-auto bg-gradient-to-br from-slate-50 to-indigo-50 p-6 md:p-12 rounded-[2rem] border border-indigo-100 shadow-xl flex flex-col md:flex-row items-center gap-8 md:gap-10">
                <div className="w-full md:w-1/2 relative group">
                  {/* 이미지 네온 글로우 효과 */}
                  <div className="absolute -inset-1 bg-gradient-to-r from-pink-500 to-indigo-500 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                  <img 
                    src="https://glamorous-maroon-nxgw7smvee.edgeone.app/%EC%8A%A4%ED%81%AC%EB%A6%B0%EC%83%B7%202026-05-04%20100433.png" 
                    alt="Guidebook Preview" 
                    className="relative rounded-2xl shadow-lg w-full object-cover transform group-hover:scale-[1.02] transition-transform duration-300 border border-white/50"
                  />
                </div>
                <div className="w-full md:w-1/2 text-left">
                  <h3 className="text-2xl font-black text-slate-800 mb-3">Bu rehber size neler sunuyor?</h3>
                  <p className="text-slate-600 mb-3 font-medium leading-relaxed">
                    "Ulaşım, yemek ve gizli mekanlar... Bu yaz Seul'de unutulmaz bir hikaye yazmanız için gereken tüm sırlar bu kitapçıkta!"
                  </p>
                  <p className="text-xs md:text-sm text-slate-400 mb-6 font-medium">
                    (교통, 맛집, 숨겨진 명소까지! 서울에서의 완벽한 휴가를 위한 모든 꿀팁이 담겨 있습니다.)
                  </p>
                  <button onClick={() => scrollTo('get-guidebook')} className="w-full md:w-auto bg-slate-900 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-600 transition-colors flex items-center justify-center">
                    Rehberi Almaya Başla <ArrowRight className="ml-2 w-4 h-4" />
                  </button>
                </div>
              </div>
            </div>
          </section>

          {/* Section 3: Interactive Lead Form */}
          <section id="get-guidebook" className="py-20 md:py-24 bg-slate-900 text-white relative">
            <div className="max-w-3xl mx-auto px-6 relative z-10">
              
              <div className="text-center mb-10">
                <h2 className="text-3xl md:text-4xl font-black mb-2">Kişiye özel rehberinizi alın</h2>
                <p className="text-sm md:text-base text-slate-400">당신만을 위한 가이드를 받아가세요.</p>
              </div>

              {!isSubmitted ? (
                <div className="bg-slate-800 rounded-3xl overflow-hidden shadow-2xl border border-slate-700 relative mt-8">
                  <div className="absolute inset-0 opacity-20 transition-opacity duration-500">
                    <img src={bgImages[`q${currentStep}`] || bgImages.q5} alt="Background" className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/80 to-transparent"></div>
                  </div>

                  <div className="relative z-10 p-8 md:p-12">
                    {/* Progress Bar (5단계 지원) */}
                    <div className="flex gap-2 mb-8">
                      {[1, 2, 3, 4, 5].map((step) => (
                        <div key={step} className={`h-1.5 flex-1 rounded-full transition-colors duration-300 ${currentStep >= step ? 'bg-indigo-500' : 'bg-slate-600'}`}></div>
                      ))}
                    </div>

                    {/* Step 1 */}
                    {currentStep === 1 && (
                      <div>
                        <h3 className="text-2xl font-bold mb-1">Kore gezisinde en çok hangi aktiviteye odaklanıyorsunuz?</h3>
                        <p className="text-slate-400 text-sm mb-8 font-light">한국 여행에서 가장 중점을 두는 활동은 무엇인가요? (택 1)</p>
                        
                        <div className="space-y-3">
                          {[
                            { val: 'Alışveriş', label: '1. Alışveriş', kor: '쇼핑' },
                            { val: 'Yemek', label: '2. Yemek', kor: '음식' },
                            { val: 'Doğal manzara', label: '3. Doğal manzara', kor: '자연경관' },
                            { val: 'Diğer', label: '4. Diğer', kor: '기타' }
                          ].map((opt) => (
                            <button 
                              key={opt.val}
                              onClick={() => handleOptionSelect(1, 'q1', opt.val, opt.val === 'Diğer')}
                              className={`w-full text-left p-4 rounded-xl border transition-all duration-200 ${formData.q1 === opt.val ? 'bg-indigo-600/20 border-indigo-500' : 'bg-slate-800/50 border-slate-600 hover:bg-slate-700 hover:border-slate-500'} flex justify-between items-center`}
                            >
                              <span className="font-bold text-lg">{opt.label}</span>
                              <span className="text-slate-500 text-xs">{opt.kor}</span>
                            </button>
                          ))}
                        </div>

                        {showOtherQ1 && (
                          <div className="mt-4 p-4 bg-slate-800/80 rounded-xl border border-indigo-500/50">
                            <input 
                              type="text" 
                              placeholder="✍️ Lütfen buraya yazın (여기에 작성해 주세요)" 
                              className="w-full bg-transparent border-b border-slate-500 p-2 text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500"
                              value={formData.q1_other}
                              onChange={(e) => setFormData({...formData, q1_other: e.target.value})}
                            />
                            <button onClick={() => setCurrentStep(2)} className="mt-4 w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-500" disabled={!formData.q1_other}>Devam Et (다음)</button>
                          </div>
                        )}
                      </div>
                    )}

                    {/* Step 2 */}
                    {currentStep === 2 && (
                      <div>
                        <button onClick={() => setCurrentStep(1)} className="text-slate-400 hover:text-white mb-6 flex items-center text-sm"><ArrowLeft className="w-4 h-4 mr-1" /> Geri</button>
                        <h3 className="text-2xl font-bold mb-1">Kore ziyaretinizi ne zaman planlamayı düşünüyorsunuz?</h3>
                        <p className="text-slate-400 text-sm mb-8 font-light">한국 방문은 언제쯤으로 계획하고 계신가요? (택 1)</p>
                        
                        <div className="space-y-3">
                          {[
                            { val: '3 ay içinde', label: '① 3 ay içinde', kor: 'bu yaz ziyaret planlanıyor / 3개월 이내' },
                            { val: '6 ay içinde', label: '② 6 ay içinde', kor: 'bu yılın ikinci yarısında / 6개월 이내' },
                            { val: 'Gelecek yıl veya sonrası', label: '③ Gelecek yıl (2027) veya sonrası', kor: '내년 이후 (또는 미정)' },
                            { val: 'Henüz ziyaret planım yok', label: '④ Henüz ziyaret planım yok, sadece rehber bilgisi almak istiyorum', kor: '가이드북 정보만' }
                          ].map((opt) => (
                            <button key={opt.val} onClick={() => handleOptionSelect(2, 'q2', opt.val)} className={`w-full text-left p-4 rounded-xl border transition-all duration-200 ${formData.q2 === opt.val ? 'bg-indigo-600/20 border-indigo-500' : 'bg-slate-800/50 border-slate-600 hover:bg-slate-700 hover:border-slate-500'}`}>
                              <div className="font-bold text-md mb-1">{opt.label}</div>
                              <div className="text-slate-500 text-xs">{opt.kor}</div>
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Step 3 */}
                    {currentStep === 3 && (
                      <div>
                        <button onClick={() => setCurrentStep(2)} className="text-slate-400 hover:text-white mb-6 flex items-center text-sm"><ArrowLeft className="w-4 h-4 mr-1" /> Geri</button>
                        <h3 className="text-2xl font-bold mb-1">Kore seyahatinizi planlarken en çok endişelendiğiniz konu nedir?</h3>
                        <p className="text-slate-400 text-sm mb-8 font-light">한국 여행을 계획할 때 가장 걱정되거나 부담스러운 부분은 무엇인가요? (택 1)</p>
                        
                        <div className="space-y-3">
                          {[
                            { val: 'Maliyet', label: '① Bütçe aşımı ve yüksek seyahat masrafları', kor: 'Maliyet / 비용' },
                            { val: 'İletişim', label: '② Yabancı dil işaretlerinin yetersizliği ve dil engeli', kor: 'İletişim / 소통' },
                            { val: 'Ulaşım', label: '③ Karmaşık toplu taşıma kullanımı ve yol bulma', kor: 'Ulaşım / 교통' },
                            { val: 'Yemek', label: '④ Damağa uygun restoran bulma ve sipariş verme güçlüğü', kor: 'Yemek / 음식' },
                            { val: 'Diğer', label: '⑤ Diğer', kor: '기타' }
                          ].map((opt) => (
                            <button key={opt.val} onClick={() => handleOptionSelect(3, 'q3', opt.val, opt.val === 'Diğer')} className={`w-full text-left p-4 rounded-xl border transition-all duration-200 ${formData.q3 === opt.val ? 'bg-indigo-600/20 border-indigo-500' : 'bg-slate-800/50 border-slate-600 hover:bg-slate-700 hover:border-slate-500'}`}>
                              <div className="font-bold text-md mb-1">{opt.label}</div>
                              <div className="text-slate-500 text-xs">{opt.kor}</div>
                            </button>
                          ))}
                        </div>

                        {showOtherQ3 && (
                          <div className="mt-4 p-4 bg-slate-800/80 rounded-xl border border-indigo-500/50">
                            <input 
                              type="text" 
                              placeholder="✍️ Lütfen endişelerinizi yazın (우려되는 점을 적어주세요)" 
                              className="w-full bg-transparent border-b border-slate-500 p-2 text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500"
                              value={formData.q3_other}
                              onChange={(e) => setFormData({...formData, q3_other: e.target.value})}
                            />
                            <button onClick={() => setCurrentStep(4)} className="mt-4 w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-500" disabled={!formData.q3_other}>Devam Et (다음)</button>
                          </div>
                        )}
                      </div>
                    )}

                    {/* Step 4 (나이 질문) */}
                    {currentStep === 4 && (
                      <div>
                        <button onClick={() => setCurrentStep(3)} className="text-slate-400 hover:text-white mb-6 flex items-center text-sm"><ArrowLeft className="w-4 h-4 mr-1" /> Geri</button>
                        <h3 className="text-2xl font-bold mb-1">Kaç yaşındasınız?</h3>
                        <p className="text-slate-400 text-sm mb-8 font-light">나이가 어떻게 되시나요? (택 1)</p>
                        
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                          {['0~10', '11~20', '21~30', '31~40', '41~50', '51~60', '61~'].map((opt) => (
                            <button 
                              key={opt}
                              type="button"
                              onClick={() => {
                                setFormData({ ...formData, age: opt });
                                setTimeout(() => setCurrentStep(5), 400); // 5단계로 이동
                              }}
                              className={`w-full text-center py-4 px-2 rounded-xl border transition-all duration-200 ${formData.age === opt ? 'bg-indigo-600 border-indigo-500 text-white font-bold shadow-lg' : 'bg-slate-800/50 border-slate-600 text-slate-300 hover:bg-slate-700 hover:border-slate-500'}`}
                            >
                              <span className="font-bold text-lg">{opt}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Step 5 (성별 선택 & 이메일 입력 - 이름은 삭제됨) */}
                    {currentStep === 5 && (
                      <div className="animate-fade-in">
                        <button onClick={() => setCurrentStep(4)} className="text-slate-400 hover:text-white mb-6 flex items-center text-sm"><ArrowLeft className="w-4 h-4 mr-1" /> Geri</button>
                        
                        <div className="text-center mb-8">
                          <h3 className="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-indigo-400 mb-2">Harika! Son bir adım.</h3>
                          <p className="text-sm md:text-base text-slate-300">Rehberi almak için bilgilerinizi girin.</p>
                          <p className="text-slate-400 text-xs mt-1">가이드북을 받을 정보를 입력해 주세요.</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-5 md:space-y-6">
                          {/* 성별 선택 영역 */}
                          <div>
                            <label className="block text-sm font-bold text-slate-300 mb-2">Cinsiyet (성별)</label>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                              {['Erkek', 'Kadın', 'Belirtmek istemiyorum'].map((g) => (
                                <button 
                                  type="button"
                                  key={g}
                                  onClick={() => {
                                    setFormData({...formData, gender: g});
                                    setFormError(''); // 선택 시 에러 초기화
                                  }}
                                  className={`py-3 px-2 rounded-xl border font-bold text-sm transition-all ${formData.gender === g ? 'bg-indigo-600 border-indigo-500 text-white shadow-lg' : 'bg-slate-900/50 border-slate-600 text-slate-400 hover:border-slate-400 hover:text-slate-200'}`}
                                >
                                  {g === 'Erkek' ? 'Erkek (남성)' : g === 'Kadın' ? 'Kadın (여성)' : 'Belirtmek istemiyorum (답변 거부)'}
                                </button>
                              ))}
                            </div>
                            {/* 폼 오류 메시지 통합 */}
                            {formError && formError.includes('cinsiyet') && (
                              <div className="flex items-center mt-2 text-red-400 text-sm font-medium">
                                <AlertCircle className="w-4 h-4 mr-1" />
                                {formError}
                              </div>
                            )}
                          </div>

                          {/* 이메일 입력칸 (이름 입력칸 삭제) */}
                          <div>
                            <label className="block text-sm font-bold text-slate-300 mb-1">E-posta (이메일)</label>
                            <input 
                              type="email" 
                              required
                              className={`w-full bg-slate-900/50 border rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-1 ${formError.includes('@') ? 'border-red-500 focus:border-red-500 focus:ring-red-500' : 'border-slate-600 focus:border-indigo-500 focus:ring-indigo-500'}`}
                              placeholder="ornek@email.com"
                              value={formData.email}
                              onChange={(e) => {
                                setFormData({...formData, email: e.target.value});
                                if(e.target.value.includes('@')) setFormError('');
                              }}
                            />
                            {/* 이메일 오류 메시지 */}
                            {formError && formError.includes('@') && (
                              <div className="flex items-center mt-2 text-red-400 text-sm font-medium">
                                <AlertCircle className="w-4 h-4 mr-1" />
                                {formError}
                              </div>
                            )}
                          </div>
                          
                          <button 
                            type="submit"
                            disabled={isSubmitting}
                            className={`w-full mt-6 text-white font-black py-4 rounded-xl flex items-center justify-center transform transition-all shadow-lg ${isSubmitting ? 'bg-slate-600 cursor-wait' : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 hover:-translate-y-1 shadow-indigo-500/30'}`}
                          >
                            {isSubmitting ? 'Gönderiliyor...' : '🎁 Rehberi Hemen İndir (가이드북 바로 받기)'}
                          </button>
                        </form>
                      </div>
                    )}
                  </div>
                </div>
              ) : (
                // Success Message (이름 제외)
                <div className="bg-slate-800 rounded-3xl p-8 md:p-12 text-center border border-slate-700 shadow-2xl mt-8 animate-fade-in">
                  <div className="w-16 h-16 md:w-20 md:h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-6">
                    <CheckCircle className="w-8 h-8 md:w-10 md:h-10" />
                  </div>
                  <h3 className="text-2xl md:text-3xl font-black mb-3">Teşekkürler!</h3>
                  <p className="text-base md:text-xl text-slate-300 mb-2">Rehberiniz <strong>{formData.email}</strong> adresine gönderildi.</p>
                  <p className="text-sm md:text-base text-slate-500 mb-8">Lütfen e-posta kutunuzu kontrol edin.</p>
                  
                  <div className="bg-slate-900/50 p-5 md:p-6 rounded-2xl inline-block text-left border border-slate-700">
                    <p className="text-xs md:text-sm text-slate-400 mb-4 text-center">Daha fazla ipucu için bizi takip edin!</p>
                    <div className="flex justify-center space-x-4">
                      <a href="https://instagram.com" target="_blank" rel="noreferrer" className="w-10 h-10 md:w-12 md:h-12 bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 text-white rounded-full flex items-center justify-center hover:opacity-90 transition-opacity">
                        <Instagram className="w-5 h-5 md:w-6 md:h-6" />
                      </a>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </section>

          {/* Section 4: Viral Loop / Share */}
          <section id="share" className="py-20 md:py-24 bg-white border-t border-slate-100 relative">
            <div className="max-w-4xl mx-auto px-6 text-center">
              <div className="w-14 h-14 md:w-16 md:h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                <Share2 className="w-7 h-7 md:w-8 md:h-8" />
              </div>
              <h2 className="text-2xl md:text-4xl font-black mb-4">Arkadaşlarınla Paylaş!</h2>
              <p className="text-base md:text-lg text-slate-500 mb-8 max-w-2xl mx-auto">
                Kore'ye birlikte gitmek istediğin arkadaşınla paylaş ve seyahat planlarına hemen başlayın.
              </p>
              
              <div className="flex flex-col sm:flex-row justify-center items-center gap-3 md:gap-4">
                {/* 왓츠앱 공유 */}
                <a 
                  href={`whatsapp://send?text=${whatsappMsg}`}
                  className="w-full sm:w-auto flex items-center justify-center px-8 py-4 bg-[#25D366] text-white font-bold rounded-xl hover:bg-[#128C7E] transition-colors shadow-md hover:shadow-lg"
                >
                  <MessageCircle className="w-6 h-6 mr-2" />
                  WhatsApp'ta Paylaş
                </a>

                {/* 인스타 공유 */}
                <a 
                  href="https://www.instagram.com/"
                  target="_blank" rel="noreferrer"
                  className="w-full sm:w-auto flex items-center justify-center px-8 py-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold rounded-xl hover:opacity-90 transition-opacity shadow-md hover:shadow-lg"
                >
                  <Instagram className="w-6 h-6 mr-2" />
                  Instagram DM
                </a>

                {/* 링크 복사 기능 */}
                <button 
                  onClick={copyToClipboard}
                  className="w-full sm:w-auto flex items-center justify-center px-8 py-4 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors shadow-md hover:shadow-lg relative"
                >
                  {copySuccess ? (
                    <><Check className="w-6 h-6 mr-2 text-green-400" /> Kopyalandı!</>
                  ) : (
                    <><Send className="w-6 h-6 mr-2" /> Bağlantıyı Kopyala</>
                  )}
                  
                  {/* 링크 복사 성공 시 뜨는 툴팁 */}
                  {copySuccess && (
                    <div className="absolute -top-12 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-xs py-2 px-4 rounded-lg shadow-xl whitespace-nowrap">
                      Bağlantı kopyalandı! (링크가 복사되었습니다)
                      <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 translate-y-1/2 rotate-45 w-2 h-2 bg-slate-800"></div>
                    </div>
                  )}
                </button>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-slate-50 py-8 text-center text-slate-400 text-sm border-t border-slate-200">
            <p>© 2026 Seoul Travel Guide Campaign. All rights reserved.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
